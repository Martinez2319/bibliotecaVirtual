<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lector - Biblioteca Virtual</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Georgia, serif; background: #fafafa; }
    
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: white;
      border-bottom: 1px solid #e5e7eb;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }
    .header a { color: #6b7280; text-decoration: none; }
    .title { text-align: center; }
    .title h1 { font-size: 1rem; }
    .title p { font-size: 0.75rem; color: #6b7280; }
    .controls button { padding: 0.5rem 0.75rem; margin-left: 0.25rem; border: 1px solid #e5e7eb; border-radius: 6px; background: white; cursor: pointer; }
    .controls button.active { background: #1a1a2e; color: white; }
    
    .format-toggle {
      display: flex;
      justify-content: center;
      gap: 1rem;
      padding: 1rem;
      background: #f3f4f6;
      margin-top: 60px;
    }
    .format-toggle button {
      padding: 0.75rem 1.5rem;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    .format-toggle button.active {
      border-color: #e94560;
      background: #e94560;
      color: white;
    }
    .format-toggle button:hover:not(.active) {
      border-color: #1a1a2e;
    }
    
    .content-text {
      max-width: 700px;
      margin: 2rem auto;
      padding: 2rem;
      line-height: 1.9;
      color: #1f2937;
      display: none;
    }
    .content-text.active { display: block; }
    .content-text p { margin-bottom: 1.5rem; text-indent: 2rem; }
    
    .content-pdf {
      width: 100%;
      height: calc(100vh - 140px);
      display: none;
    }
    .content-pdf.active { display: block; }
    .content-pdf iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    
    .no-content {
      text-align: center;
      padding: 4rem 2rem;
      color: #6b7280;
      margin-top: 60px;
    }
    .no-content h2 { margin-bottom: 1rem; color: #1a1a2e; }
  </style>
</head>
<body>
  <header class="header">
    <a href="#" onclick="history.back()">← Volver</a>
    <div class="title">
      <h1 id="bookTitle">Cargando...</h1>
      <p id="bookAuthor"></p>
    </div>
    <div class="controls" id="textControls" style="display:none;">
      <button onclick="changeFont(-2)">A-</button>
      <button onclick="changeFont(2)">A+</button>
    </div>
  </header>

  <div class="format-toggle" id="formatToggle" style="display:none;">
    <button id="btnPdf" onclick="showFormat('pdf')">📄 Ver PDF</button>
    <button id="btnText" onclick="showFormat('text')">📝 Ver Texto</button>
  </div>

  <div class="content-pdf" id="contentPdf">
    <iframe id="pdfViewer" src=""></iframe>
  </div>

  <div class="content-text" id="contentText"></div>

  <div class="no-content" id="noContent" style="display:none;">
    <h2>📚 Sin contenido</h2>
    <p>Este libro aún no tiene contenido disponible.</p>
  </div>

  <script>
    const bookId = location.pathname.split('/').pop();
    let fontSize = 18;
    let hasPdf = false;
    let hasText = false;

    async function loadBook() {
      const res = await fetch(`/api/books/${bookId}`);
      const book = await res.json();
      
      document.getElementById('bookTitle').textContent = book.title;
      document.getElementById('bookAuthor').textContent = book.author;
      document.title = book.title + ' - Lector';

      hasPdf = book.pdfUrl && book.pdfUrl.trim() !== '';
      hasText = book.content && book.content.trim() !== '';

      // Configurar visor según contenido disponible
      if (hasPdf && hasText) {
        // Ambos disponibles - mostrar toggle
        document.getElementById('formatToggle').style.display = 'flex';
        document.getElementById('pdfViewer').src = book.pdfUrl;
        document.getElementById('contentText').innerHTML = book.content.split('\n').map(p => `<p>${p}</p>`).join('');
        showFormat('pdf'); // Por defecto mostrar PDF
      } else if (hasPdf) {
        // Solo PDF
        document.getElementById('formatToggle').style.display = 'none';
        document.getElementById('pdfViewer').src = book.pdfUrl;
        document.getElementById('contentPdf').classList.add('active');
      } else if (hasText) {
        // Solo texto
        document.getElementById('formatToggle').style.display = 'none';
        document.getElementById('contentText').innerHTML = book.content.split('\n').map(p => `<p>${p}</p>`).join('');
        document.getElementById('contentText').classList.add('active');
        document.getElementById('textControls').style.display = 'block';
      } else {
        // Sin contenido
        document.getElementById('noContent').style.display = 'block';
      }
    }

    function showFormat(format) {
      const pdf = document.getElementById('contentPdf');
      const text = document.getElementById('contentText');
      const btnPdf = document.getElementById('btnPdf');
      const btnText = document.getElementById('btnText');
      const textControls = document.getElementById('textControls');

      if (format === 'pdf') {
        pdf.classList.add('active');
        text.classList.remove('active');
        btnPdf.classList.add('active');
        btnText.classList.remove('active');
        textControls.style.display = 'none';
      } else {
        pdf.classList.remove('active');
        text.classList.add('active');
        btnPdf.classList.remove('active');
        btnText.classList.add('active');
        textControls.style.display = 'block';
      }
    }

    function changeFont(delta) {
      fontSize = Math.max(14, Math.min(28, fontSize + delta));
      document.getElementById('contentText').style.fontSize = fontSize + 'px';
    }

    loadBook();
  </script>
</body>
</html>
