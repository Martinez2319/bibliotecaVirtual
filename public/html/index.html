<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca Virtual</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/index.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-content">
      <a href="/" class="logo">📚 Biblioteca Virtual</a>
      <div class="nav-links">
        <a href="/">Inicio</a>
        <a href="/catalog">Catálogo</a>
        <a href="#" id="donateBtn">💝 Donar</a>
        <span id="authLinks">
          <a href="/login">Iniciar Sesión</a>
          <a href="/register" class="btn btn-primary">Registrarse</a>
        </span>
        <span id="userMenu" style="display:none;">
          <a href="/dashboard" id="adminLink" style="display:none;">Admin</a>
          <span id="userName"></span>
          <a href="#" id="logoutBtn">Salir</a>
        </span>
      </div>
    </div>
  </nav>

  <section class="hero">
    <div>
      <h1>Descubre un mundo de conocimiento</h1>
      <p>Explora nuestra colección de libros digitales</p>
      <a href="/catalog" class="btn btn-primary">Explorar Catálogo</a>
    </div>
  </section>

  <section class="section">
    <h2 class="section-title">📚 Libros Destacados</h2>
    <div class="carousel" id="featuredBooks"></div>
  </section>

  <section class="section">
    <h2 class="section-title">🆕 Recién Agregados</h2>
    <div class="carousel" id="recentBooks"></div>
  </section>

  <section class="section">
    <h2 class="section-title">📂 Categorías</h2>
    <div class="categories-grid" id="categories"></div>
  </section>

  <footer class="footer">
    <p>© 2024 Biblioteca Virtual</p>
  </footer>

  <div class="modal" id="donateModal">
    <div class="modal-content">
      <h2>💝 Apoya la Biblioteca</h2>
      <div class="amount-btns">
        <button class="btn btn-outline" onclick="setAmount(5)">$5</button>
        <button class="btn btn-outline" onclick="setAmount(10)">$10</button>
        <button class="btn btn-outline" onclick="setAmount(25)">$25</button>
      </div>
      <input type="number" id="donateAmount" value="10" min="1">
      <button class="btn btn-primary" style="width:100%;margin-top:0.5rem;" onclick="renderPaypal()">Donar con PayPal</button>
      <div id="paypalButtons" style="margin-top:0.75rem;"></div>
      <button onclick="closeDonateModal()" style="width:100%;margin-top:0.5rem;background:none;border:none;cursor:pointer;">Cancelar</button>
    </div>
  </div>

  <script src="/javascript/common.js"></script>
  <script src="/javascript/index.js"></script>
  <!-- Botpress Webchat -->
  <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
  <script src="https://files.bpcontent.cloud/2026/03/06/05/20260306052011-BLL4JDG8.js"></script>
</body>
</html>
