<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Libro - Biblioteca Virtual</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/index.css">
  <link rel="stylesheet" href="/css/book.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-content">
      <a href="/" class="logo">📚 Biblioteca Virtual</a>
      <div class="nav-links">
        <a href="/">Inicio</a>
        <a href="/catalog">Catálogo</a>
        <span id="authLinks">
          <a href="/login">Iniciar Sesión</a>
        </span>
        <span id="userMenu" style="display:none;">
          <a href="/dashboard" id="adminLink" style="display:none;">Admin</a>
          <span id="userName"></span>
          <a href="#" id="logoutBtn">Salir</a>
        </span>
      </div>
    </div>
  </nav>

  <div class="book-detail">
    <a href="/catalog" class="back">← Volver al catálogo</a>
    <div class="book-layout">
      <div class="book-cover">
        <img id="cover" src="" alt="Portada">
      </div>
      <div class="book-info">
        <h1 id="title">Cargando...</h1>
        <p class="book-author" id="author"></p>
        <p class="book-desc" id="description"></p>
        <div id="formatBadges" style="margin-bottom:1rem;"></div>
        <button class="btn btn-primary read-btn" id="readBtn">📖 Leer Ahora</button>
        <p class="warning" id="warning" style="display:none;">⚠️ Invitados: límite de 1 libro. <a href="/register">Regístrate</a></p>
      </div>
    </div>
  </div>

  <style>
    /* Skeleton para portada del libro */
    .cover-skeleton {
      width: 100%;
      height: 350px;
      background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%);
      background-size: 200% 100%;
      animation: skeleton-pulse 1.2s infinite;
      border-radius: 8px;
    }
    @keyframes skeleton-pulse {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .book-cover img {
      transition: opacity 0.3s ease;
    }
    .book-cover img.loading {
      opacity: 0;
    }
  </style>
  <script src="/javascript/common.js"></script>
  <script>
    const bookId = location.pathname.split('/').pop();
    
    // Mostrar skeleton inmediatamente
    const coverEl = document.getElementById('cover');
    coverEl.classList.add('loading');
    coverEl.insertAdjacentHTML('beforebegin', '<div class="cover-skeleton" id="coverSkeleton"></div>');

    async function loadBook() {
      // Iniciar carga de datos y auth en paralelo
      const [bookRes, authRes] = await Promise.all([
        fetch(`/api/books/${bookId}`),
        fetch('/api/auth/me')
      ]);
      
      const book = await bookRes.json();
      
      // Precargar imagen antes de mostrar
      const coverUrl = convertDriveImageUrl(book.coverUrl) || PLACEHOLDER_IMG;
      const img = new Image();
      img.onload = () => {
        coverEl.src = coverUrl;
        coverEl.classList.remove('loading');
        document.getElementById('coverSkeleton')?.remove();
      };
      img.onerror = () => {
        coverEl.src = PLACEHOLDER_IMG;
        coverEl.classList.remove('loading');
        document.getElementById('coverSkeleton')?.remove();
      };
      img.src = coverUrl;
      
      // Actualizar UI inmediatamente con datos de texto
      document.getElementById('title').textContent = book.title;
      document.getElementById('author').textContent = book.author;
      document.getElementById('description').textContent = book.description || 'Sin descripción.';
      document.title = book.title + ' - Biblioteca Virtual';

      let badges = '';
      if (book.pdfUrl) badges += '<span style="background:#fef2f2;color:#dc2626;padding:4px 10px;border-radius:6px;font-size:0.85rem;margin-right:6px;">📄 PDF</span>';
      if (book.content) badges += '<span style="background:#eff6ff;color:#2563eb;padding:4px 10px;border-radius:6px;font-size:0.85rem;">📝 Texto</span>';
      document.getElementById('formatBadges').innerHTML = badges;

      if (!authRes.ok) document.getElementById('warning').style.display = 'block';
    }

    document.getElementById('readBtn').addEventListener('click', async () => {
      const res = await fetch(`/api/books/${bookId}/read`, { method: 'POST' });
      const data = await res.json();
      if (data.allowed) {
        location.href = `/reader/${bookId}`;
      } else {
        alert(data.message);
      }
    });

    checkAuth();
    setupLogout();
    loadBook();
  </script>
</body>
</html>
