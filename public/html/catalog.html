
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo - Biblioteca Virtual</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/index.css">
  <link rel="stylesheet" href="/css/catalog.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-content">
      <a href="/" class="logo">📚 Biblioteca Virtual</a>
      <div class="nav-links">
        <a href="/">Inicio</a>
        <a href="/catalog">Catálogo</a>
        <span id="authLinks">
          <a href="/login">Iniciar Sesión</a>
          <a href="/register" class="btn btn-primary">Registrarse</a>
        </span>
        <span id="userMenu" style="display:none;">
          <a href="/dashboard" id="adminLink" style="display:none;">Admin</a>
          <span id="userName"></span>
          <a href="#" id="logoutBtn">Salir</a>
        </span>
      </div>
    </div>
  </nav>

  <div class="catalog">
    <h1 style="margin-bottom:1.5rem;">Catálogo de Libros</h1>
    <div class="filters">
      <input type="text" id="search" placeholder="Buscar libros...">
      <select id="category">
        <option value="">Todas las categorías</option>
      </select>
      <select id="sort">
        <option value="createdAt">Más recientes</option>
        <option value="views">Más populares</option>
        <option value="title">Título A-Z</option>
      </select>
    </div>
    <div class="books-grid" id="books"></div>
  </div>

  <script src="/javascript/common.js"></script>
  <script>
    // Verificar autenticación al cargar
    checkAuth();
    setupLogout();

    async function loadCategories() {
      const cats = await fetch('/api/categories').then(r => r.json());
      const select = document.getElementById('category');
      cats.forEach(c => select.innerHTML += `<option value="${escapeHtml(c.name)}">${escapeHtml(c.name)}</option>`);
      const params = new URLSearchParams(location.search);
      if (params.get('category')) select.value = params.get('category');
    }

    async function loadBooks() {
      const search = document.getElementById('search').value;
      const category = document.getElementById('category').value;
      const sort = document.getElementById('sort').value;
      
      const params = new URLSearchParams();
      if (search) params.append('search', search);
      if (category) params.append('category', category);
      params.append('sort', sort);

      const books = await fetch(`/api/books?${params}`).then(r => r.json());
      document.getElementById('books').innerHTML = books.map(renderBookCard).join('');
    }

    let timeout;
    document.getElementById('search').addEventListener('input', () => {
      clearTimeout(timeout);
      timeout = setTimeout(loadBooks, 300);
    });
    document.getElementById('category').addEventListener('change', loadBooks);
    document.getElementById('sort').addEventListener('change', loadBooks);

    loadCategories().then(loadBooks);
  </script>
  <!-- Botpress Webchat -->
  <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
  <script src="https://files.bpcontent.cloud/2026/03/06/05/20260306052011-BLL4JDG8.js"></script>
</body>
</html>
