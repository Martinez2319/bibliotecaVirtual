<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrarse - Biblioteca Virtual</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/login.css">
</head>
<body>
  <div class="login-container">
    <div class="login-image"></div>
    <div class="login-form">
      <a href="/" class="logo">📚 Biblioteca Virtual</a>
      <h1>Crear cuenta</h1>
      <p>Regístrate para leer sin límites</p>
      <form id="registerForm">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" id="name" required placeholder="Tu nombre">
        </div>
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" id="email" required placeholder="tu@email.com">
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="password" required placeholder="Mínimo 6 caracteres" minlength="6">
        </div>
        <button type="submit" class="btn btn-accent">Crear Cuenta</button>
      </form>
      <p class="link">¿Ya tienes cuenta? <a href="/login">Inicia sesión</a></p>
    </div>
  </div>
  <script src="/javascript/register.js"></script>
</body>
</html>
